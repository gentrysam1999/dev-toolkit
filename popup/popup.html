<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dev Toolkit</title>
  <link rel="stylesheet" href="../shared/css/tokens.css" />
  <link rel="stylesheet" href="popup.css" />
  <link rel="stylesheet" href="../tools/color-picker/color-picker.css" />
  <link rel="stylesheet" href="../tools/time-diff/time-diff.css" />
  <link rel="stylesheet" href="../settings/settings.css" />
  <link rel="stylesheet" href="../tools/diff-checker/diff-checker.css" />
</head>
<body>
  <div class="app">

    <!-- LEFT SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sidebar__logo" title="Dev Toolkit">
        <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="9" stroke="#818cf8" stroke-width="2"/>
          <circle cx="11" cy="11" r="3" fill="#818cf8"/>
        </svg>
      </div>

      <ul class="sidebar__tabs" role="tablist" aria-label="Tools">

        <li class="sidebar__tab sidebar__tab--active"
            role="tab"
            aria-selected="true"
            aria-controls="panel-color-picker"
            data-tool="color-picker"
            tabindex="0"
            title="Color Picker">
          <!-- Eyedropper icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M20.71 5.63L18.37 3.29a1 1 0 0 0-1.41 0l-2.83 2.83 1.07 1.07L14.1 8.3l-1.06-1.06-6.37 6.37a2 2 0 0 0-.59 1.41V17h2.97a2 2 0 0 0 1.41-.59l6.37-6.37-1.06-1.06 1.06-1.06 1.07 1.07 2.83-2.83a1 1 0 0 0 0-1.53z" fill="currentColor"/>
            <path d="M3 21h4l-4-4v4z" fill="currentColor"/>
          </svg>
          <span class="sidebar__label">Color</span>
        </li>

        <li class="sidebar__tab"
            role="tab"
            aria-selected="false"
            aria-controls="panel-diff-checker"
            data-tool="diff-checker"
            tabindex="-1"
            title="Diff Checker">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M8 6H5a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16 6h3a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2h-3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 3v18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            <path d="M9 9l-2 3 2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M15 9l2 3-2 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="sidebar__label">Diff</span>
        </li>

        <li class="sidebar__tab"
            role="tab"
            aria-selected="false"
            aria-controls="panel-time-diff"
            data-tool="time-diff"
            tabindex="-1"
            title="Time Diff">
          <!-- Clock/diff icon -->
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/>
            <path d="M12 7v5l3 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="sidebar__label">Time</span>
        </li>

        <!--
          To add a future tool, copy this <li> block, update data-tool,
          aria-controls, the icon SVG, and the label text.
        -->

      </ul>

      <!-- Settings tab pinned to bottom of sidebar -->
      <div class="sidebar__bottom">
        <li class="sidebar__tab"
            role="tab"
            aria-selected="false"
            aria-controls="panel-settings"
            data-tool="settings"
            tabindex="-1"
            title="Settings">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span class="sidebar__label">Settings</span>
        </li>
      </div>

    </nav>

    <!-- MAIN CONTENT -->
    <main class="content" id="content">

      <section class="tool-panel tool-panel--active"
               id="panel-color-picker"
               role="tabpanel"
               aria-label="Color Picker">
        <!-- Populated by color-picker.js -->
      </section>

      <section class="tool-panel"
               id="panel-time-diff"
               role="tabpanel"
               aria-label="Time Diff">
        <!-- Populated by time-diff.js -->
      </section>

      <section class="tool-panel"
               id="panel-settings"
               role="tabpanel"
               aria-label="Settings">
        <!-- Populated by settings.js -->
      </section>

      <section class="tool-panel"
               id="panel-diff-checker"
               role="tabpanel"
               aria-label="Diff Checker">
        <!-- Populated by diff-checker.js -->
      </section>

      <!--
        Future panels:
        <section class="tool-panel" id="panel-contrast" role="tabpanel" aria-label="Contrast Checker"></section>
      -->

    </main>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
