<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diff Checker — Dev Toolkit</title>
  <link rel="stylesheet" href="diff-checker.css" />
  <link rel="stylesheet" href="diff-view.css" />
</head>
<body>
  <div class="dv-root">

    <header class="dv-header">
      <div class="dv-header-left">
        <svg width="18" height="18" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="11" cy="11" r="9" stroke="#818cf8" stroke-width="2"/>
          <circle cx="11" cy="11" r="3" fill="#818cf8"/>
        </svg>
        <span class="dv-title">Diff Checker</span>
      </div>
      <div class="dv-legend">
        <span class="dv-legend-del">Deleted</span>
        <span class="dv-legend-ins">Inserted</span>
      </div>
    </header>

    <!-- Editable inputs -->
    <div class="dv-inputs">
      <div class="dv-input-col">
        <label class="dv-input-label" for="dv-input-a">Original</label>
        <textarea id="dv-input-a" class="dv-textarea" placeholder="Paste original text…" spellcheck="false" autocomplete="off"></textarea>
      </div>
      <div class="dv-input-col">
        <label class="dv-input-label" for="dv-input-b">Modified</label>
        <textarea id="dv-input-b" class="dv-textarea" placeholder="Paste modified text…" spellcheck="false" autocomplete="off"></textarea>
      </div>
    </div>

    <!-- Diff output -->
    <div class="dv-columns" id="dv-columns">
      <div class="dv-col">
        <div class="dv-col-header">
          <span class="dv-col-label">Original</span>
          <button class="dv-btn-copy" id="dv-copy-a" type="button" title="Copy original text">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
            </svg>
            Copy
          </button>
          <span class="dv-copied" id="dv-copied-a" aria-live="polite">Copied!</span>
        </div>
        <div class="dc-output dv-output" id="dv-left" aria-label="Original text diff"></div>
      </div>
      <div class="dv-col">
        <div class="dv-col-header">
          <span class="dv-col-label">Modified</span>
          <button class="dv-btn-copy" id="dv-copy-b" type="button" title="Copy modified text">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
              <rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" stroke="currentColor" stroke-width="2"/>
            </svg>
            Copy
          </button>
          <span class="dv-copied" id="dv-copied-b" aria-live="polite">Copied!</span>
        </div>
        <div class="dc-output dv-output" id="dv-right" aria-label="Modified text diff"></div>
      </div>
    </div>

    <p class="dv-empty" id="dv-empty" hidden>
      No diff data found. Open the extension, enter text into both inputs, and click <strong>Open in Tab</strong>.
    </p>

  </div>
  <script type="module" src="diff-view.js"></script>
</body>
</html>
